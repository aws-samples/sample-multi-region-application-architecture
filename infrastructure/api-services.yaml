AWSTemplateFormatVersion: '2010-09-09'
Description: 'AirportHub API Services - Lambda functions, ALB rules, data seeding'

Parameters:
  StackPrefix:
    Type: String
  IsPrimaryRegion:
    Type: String
    AllowedValues: ['true', 'false']
  VpcId:
    Type: String
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String
  LambdaSecurityGroupId:
    Type: String
  HttpListenerArn:
    Type: String
  DocDbEndpoint:
    Type: String
  DocDbSecretArn:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoAppClientId:
    Type: String
  FlightAwareSecretArn:
    Type: String
    Default: ''
  # Bug #67: Cognito lives in primary region only — pass explicitly
  PrimaryRegion:
    Type: String
    Default: 'us-east-1'
    Description: Primary region where Cognito User Pool is deployed

Conditions:
  IsPrimary: !Equals [!Ref IsPrimaryRegion, 'true']

Resources:

  # ============================================================
  # Shared Lambda execution role - SecretsManager + VPC + Logs
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${StackPrefix}-lambda-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SecretsAndLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackPrefix}/docdb/credentials-*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackPrefix}/flightaware/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ============================================================
  # Airport Lambda
  # ============================================================
  AirportFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${StackPrefix}-airport'
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Code: ../airport-service/
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      ReservedConcurrentExecutions: 10
      TracingConfig:
        Mode: Active
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Environment:
        Variables:
          DOCDB_ENDPOINT: !Ref DocDbEndpoint
          DOCDB_SECRET_ARN: !Ref DocDbSecretArn
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId
          COGNITO_REGION: !Ref PrimaryRegion
      Tags:
        - Key: Project
          Value: AirportHub

  AirportPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AirportFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  AirportTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: AirportPermission
    Properties:
      Name: !Sub '${StackPrefix}-airport-tg'
      TargetType: lambda
      Targets:
        - Id: !GetAtt AirportFunction.Arn

  AirportListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListenerArn
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ['/api/airports*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AirportTargetGroup

  # ============================================================
  # Flights Lambda
  # ============================================================
  FlightsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${StackPrefix}-flights'
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Code: ../flights-service/
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 256
      ReservedConcurrentExecutions: 10
      TracingConfig:
        Mode: Active
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Environment:
        Variables:
          DOCDB_ENDPOINT: !Ref DocDbEndpoint
          DOCDB_SECRET_ARN: !Ref DocDbSecretArn
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId
          COGNITO_REGION: !Ref PrimaryRegion
          FA_SECRET_ARN: !Ref FlightAwareSecretArn
      Tags:
        - Key: Project
          Value: AirportHub

  FlightsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FlightsFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  FlightsTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: FlightsPermission
    Properties:
      Name: !Sub '${StackPrefix}-flights-tg'
      TargetType: lambda
      Targets:
        - Id: !GetAtt FlightsFunction.Arn

  FlightsListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListenerArn
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values: ['/api/flights*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref FlightsTargetGroup

  # ============================================================
  # Crew Lambda
  # ============================================================
  CrewFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${StackPrefix}-crew'
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Code: ../crew-service/
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      ReservedConcurrentExecutions: 10
      TracingConfig:
        Mode: Active
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Environment:
        Variables:
          DOCDB_ENDPOINT: !Ref DocDbEndpoint
          DOCDB_SECRET_ARN: !Ref DocDbSecretArn
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId
          COGNITO_REGION: !Ref PrimaryRegion
      Tags:
        - Key: Project
          Value: AirportHub

  CrewPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CrewFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  CrewTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: CrewPermission
    Properties:
      Name: !Sub '${StackPrefix}-crew-tg'
      TargetType: lambda
      Targets:
        - Id: !GetAtt CrewFunction.Arn

  CrewListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListenerArn
      Priority: 30
      Conditions:
        - Field: path-pattern
          Values: ['/api/crew*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref CrewTargetGroup

  # ============================================================
  # Data Seed Custom Resource - seeds airports + crew on CREATE
  # ============================================================
  DataSeedRole:
    Type: AWS::IAM::Role
    Condition: IsPrimary
    Properties:
      RoleName: !Sub '${StackPrefix}-data-seed-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SeedPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DocDbSecretArn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  DataSeedFunction:
    Type: AWS::Lambda::Function
    Condition: IsPrimary
    Properties:
      FunctionName: !Sub '${StackPrefix}-data-seed'
      Runtime: python3.12
      Handler: lambda_function.handler
      Code: ../custom-resources/data-seed/
      Role: !GetAtt DataSeedRole.Arn
      Timeout: 300
      MemorySize: 128
      ReservedConcurrentExecutions: 10
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Tags:
        - Key: Project
          Value: AirportHub

  DataSeedCustomResource:
    Type: Custom::DataSeed
    Condition: IsPrimary
    DependsOn:
      - AirportFunction
      - FlightsFunction
      - CrewFunction
    Properties:
      ServiceToken: !GetAtt DataSeedFunction.Arn
      ServiceTimeout: 300
      DocDbEndpoint: !Ref DocDbEndpoint
      DocDbSecretArn: !Ref DocDbSecretArn
      DatabaseName: airports
      SeedVersion: "2"

Outputs:
  FlightsLambdaArn:
    Value: !GetAtt FlightsFunction.Arn
  FlightsLambdaName:
    Value: !Ref FlightsFunction
  AirportLambdaArn:
    Value: !GetAtt AirportFunction.Arn
  AirportLambdaName:
    Value: !Ref AirportFunction
  CrewLambdaArn:
    Value: !GetAtt CrewFunction.Arn
  CrewLambdaName:
    Value: !Ref CrewFunction
