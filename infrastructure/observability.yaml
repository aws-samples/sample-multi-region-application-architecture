AWSTemplateFormatVersion: '2010-09-09'
Description: 'AirportHub Observability - per-region CloudWatch dashboard and alarms'

Parameters:
  StackPrefix:
    Type: String
  IsPrimaryRegion:
    Type: String
    AllowedValues: ['true', 'false']
  EcsClusterName:
    Type: String
  EcsServiceName:
    Type: String
  AlbFullName:
    Type: String
  AlbTargetGroupFullName:
    Type: String
  FlightsLambdaName:
    Type: String
  AirportLambdaName:
    Type: String
  CrewLambdaName:
    Type: String
  DocDbClusterIdentifier:
    Type: String
  RegionRole:
    Type: String
    Default: 'Primary'

Conditions:
  IsPrimary: !Equals [!Ref IsPrimaryRegion, 'true']

Resources:

  # ============================================================
  # CloudWatch Dashboard - per-region metrics
  # ============================================================
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${StackPrefix}-${AWS::Region}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text", "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": { "markdown": "# ✈️ AirportHub - ${AWS::Region} (${RegionRole})" }
            },
            {
              "type": "text", "x": 0, "y": 1, "width": 24, "height": 1,
              "properties": { "markdown": "## ECS Fargate" }
            },
            {
              "type": "metric", "x": 0, "y": 2, "width": 8, "height": 6,
              "properties": {
                "title": "ECS CPU Utilization",
                "metrics": [["AWS/ECS", "CPUUtilization", "ClusterName", "${EcsClusterName}", "ServiceName", "${EcsServiceName}"]],
                "period": 300, "stat": "Average", "view": "timeSeries", "region": "${AWS::Region}", "yAxis": {"left": {"min": 0, "max": 100}}
              }
            },
            {
              "type": "metric", "x": 8, "y": 2, "width": 8, "height": 6,
              "properties": {
                "title": "ECS Memory Utilization",
                "metrics": [["AWS/ECS", "MemoryUtilization", "ClusterName", "${EcsClusterName}", "ServiceName", "${EcsServiceName}"]],
                "period": 300, "stat": "Average", "view": "timeSeries", "region": "${AWS::Region}", "yAxis": {"left": {"min": 0, "max": 100}}
              }
            },
            {
              "type": "metric", "x": 16, "y": 2, "width": 8, "height": 6,
              "properties": {
                "title": "ECS Running Tasks",
                "metrics": [
                  ["ECS/ContainerInsights", "RunningTaskCount", "ClusterName", "${EcsClusterName}", "ServiceName", "${EcsServiceName}"],
                  ["ECS/ContainerInsights", "DesiredTaskCount", "ClusterName", "${EcsClusterName}", "ServiceName", "${EcsServiceName}"]
                ],
                "period": 300, "stat": "Average", "view": "timeSeries", "region": "${AWS::Region}", "yAxis": {"left": {"min": 0}}
              }
            },
            {
              "type": "text", "x": 0, "y": 8, "width": 24, "height": 1,
              "properties": { "markdown": "## Application Load Balancer" }
            },
            {
              "type": "metric", "x": 0, "y": 9, "width": 8, "height": 6,
              "properties": {
                "title": "ALB Request Count",
                "metrics": [["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${AlbFullName}"]],
                "period": 300, "stat": "Sum", "view": "timeSeries", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 8, "y": 9, "width": 8, "height": 6,
              "properties": {
                "title": "ALB 5xx Errors",
                "metrics": [
                  ["AWS/ApplicationELB", "HTTPCode_ELB_5XX_Count", "LoadBalancer", "${AlbFullName}"],
                  ["AWS/ApplicationELB", "HTTPCode_Target_5XX_Count", "LoadBalancer", "${AlbFullName}"]
                ],
                "period": 300, "stat": "Sum", "view": "timeSeries", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 16, "y": 9, "width": 8, "height": 6,
              "properties": {
                "title": "ALB Response Time",
                "metrics": [["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${AlbFullName}"]],
                "period": 300, "stat": "Average", "view": "timeSeries", "region": "${AWS::Region}", "yAxis": {"left": {"min": 0}}
              }
            },
            {
              "type": "text", "x": 0, "y": 15, "width": 24, "height": 1,
              "properties": { "markdown": "## Lambda Functions" }
            },
            {
              "type": "metric", "x": 0, "y": 16, "width": 8, "height": 6,
              "properties": {
                "title": "Lambda Invocations",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AirportLambdaName}", {"label": "Airport"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${FlightsLambdaName}", {"label": "Flights"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${CrewLambdaName}", {"label": "Crew"}]
                ],
                "period": 300, "stat": "Sum", "view": "timeSeries", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 8, "y": 16, "width": 8, "height": 6,
              "properties": {
                "title": "Lambda Errors",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "${AirportLambdaName}", {"label": "Airport"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${FlightsLambdaName}", {"label": "Flights"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${CrewLambdaName}", {"label": "Crew"}]
                ],
                "period": 300, "stat": "Sum", "view": "timeSeries", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 16, "y": 16, "width": 8, "height": 6,
              "properties": {
                "title": "Lambda Duration",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${AirportLambdaName}", {"label": "Airport"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${FlightsLambdaName}", {"label": "Flights"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${CrewLambdaName}", {"label": "Crew"}]
                ],
                "period": 300, "stat": "Average", "view": "timeSeries", "region": "${AWS::Region}", "yAxis": {"left": {"min": 0}}
              }
            },
            {
              "type": "text", "x": 0, "y": 22, "width": 24, "height": 1,
              "properties": { "markdown": "## DocumentDB" }
            },
            {
              "type": "metric", "x": 0, "y": 23, "width": 12, "height": 6,
              "properties": {
                "title": "DocDB CPU Utilization",
                "metrics": [["AWS/DocDB", "CPUUtilization", "DBClusterIdentifier", "${DocDbClusterIdentifier}"]],
                "period": 300, "stat": "Average", "view": "timeSeries", "region": "${AWS::Region}", "yAxis": {"left": {"min": 0, "max": 100}}
              }
            },
            {
              "type": "metric", "x": 12, "y": 23, "width": 12, "height": 6,
              "properties": {
                "title": "DocDB Connections",
                "metrics": [["AWS/DocDB", "DatabaseConnections", "DBClusterIdentifier", "${DocDbClusterIdentifier}"]],
                "period": 300, "stat": "Average", "view": "timeSeries", "region": "${AWS::Region}", "yAxis": {"left": {"min": 0}}
              }
            }
          ]
        }

  # ============================================================
  # CloudWatch Alarms
  # ============================================================
  Alb5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackPrefix}-${AWS::Region}-ALB-5xx'
      MetricName: HTTPCode_ELB_5XX_Count
      Namespace: AWS/ApplicationELB
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref AlbFullName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  AlbLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackPrefix}-${AWS::Region}-ALB-Latency'
      MetricName: TargetResponseTime
      Namespace: AWS/ApplicationELB
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref AlbFullName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DocDbCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackPrefix}-${AWS::Region}-DocDB-CPU'
      MetricName: CPUUtilization
      Namespace: AWS/DocDB
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref DocDbClusterIdentifier
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing

  LambdaAirportErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackPrefix}-${AWS::Region}-Lambda-Airport-Errors'
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref AirportLambdaName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  LambdaFlightsErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackPrefix}-${AWS::Region}-Lambda-Flights-Errors'
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref FlightsLambdaName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  DashboardName:
    Value: !Sub '${StackPrefix}-${AWS::Region}'
  DashboardUrl:
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${StackPrefix}-${AWS::Region}'
